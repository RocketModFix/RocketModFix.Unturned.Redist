name: "Redist Update"

on:
  schedule:
    - cron: "*/15 * * * *"  # Run every 15 minutes
  workflow_dispatch:
    inputs:
      variant:
        description: 'A variant name from .github/variants.json, or "all"'
        required: true
        default: 'all'
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: unturned-redist-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Single source of truth: the variant matrix lives in .github/variants.json.
  # This job loads it (optionally filtered by the workflow_dispatch input) and
  # exposes it as a matrix for update_redist. To add/remove a variant, edit
  # .github/variants.json only.
  load-variants:
    name: "Load Variants"
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.load.outputs.variants }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load variant matrix
        id: load
        env:
          INPUT_VARIANT: ${{ github.event.inputs.variant }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${INPUT_VARIANT:-}" ] && [ "$INPUT_VARIANT" != "all" ]; then
            if ! jq -e --arg v "$INPUT_VARIANT" 'any(.[]; .variant == $v)' .github/variants.json >/dev/null; then
              echo "::error::Unknown variant '$INPUT_VARIANT'. Valid variants:"
              jq -r '.[].variant' .github/variants.json
              exit 1
            fi
            variants=$(jq -c --arg v "$INPUT_VARIANT" '[.[] | select(.variant == $v)]' .github/variants.json)
          else
            variants=$(jq -c '.' .github/variants.json)
          fi
          echo "variants=$variants" >> "$GITHUB_OUTPUT"

  update_redist:
    name: "Update ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    needs: load-variants
    # fail-fast:false keeps the other variants running if one fails; we no
    # longer swallow failures with continue-on-error so a broken variant turns
    # the run red (and notify-failure files an issue).
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-variants.outputs.variants) }}
    # Steam allows only one session per account per LoginID. The DepotDownloader
    # probe handles that with a unique -loginid per variant (see below), so
    # probes run fully parallel. But steamcmd (the download step) has no LoginID,
    # so two authenticated variants of the SAME Steam source downloading at once
    # would still collide. This concurrency group serializes only those: each
    # anonymous variant gets its own group (fully parallel), while authenticated
    # variants are grouped by app+branch (same upstream source → serialized;
    # different sources → still parallel). Anonymous client variants and distinct
    # server sources all run concurrently.
    concurrency:
      group: redist-steam-${{ matrix.anonymous && matrix.variant || format('{0}-{1}', matrix.appId, matrix.branch) }}
      cancel-in-progress: false

    steps:
      - name: Generate branch name
        run: echo "BRANCH_NAME=redist-update/${{ matrix.variant }}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        env:
          DOTNET_NOLOGO: true
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
          DOTNET_CLI_TELEMETRY_OPTOUT: true
        with:
          # UnturnedRedistUpdateTool targets net10 (run via 'dotnet <tool>.dll').
          # DepotDownloader's linux-x64 release is self-contained, so only the
          # redist tool's runtime needs to be installed here.
          dotnet-version: 10.x

      - name: Download depot downloader
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1
        with:
          repository: SteamRE/DepotDownloader
          latest: true
          fileName: DepotDownloader-linux-x64.zip
          out-file-path: depot_downloader
          tag: "DepotDownloader_3.4.0" # Pin its version to avoid breaking changes.
          extract: true

      - name: Compare current vs saved manifest
        id: compare_manifest
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          APP_ID: ${{ matrix.appId }}
          APP_DEPOT_ID: ${{ matrix.depotId }}
          APP_BRANCH_NAME: ${{ matrix.branch }}
          VARIANT: ${{ matrix.variant }}
          ANONYMOUS: ${{ matrix.anonymous }}
          LOGIN_ID: ${{ matrix.loginId }}
        run: |
          set -euo pipefail
          MANIFEST_FILE="redist/redist-manifests/.manifest.redist-${VARIANT}.txt"
          mkdir -p redist/temp_depots
          chmod +x depot_downloader/DepotDownloader

          beta_args=()
          if [ -n "$APP_BRANCH_NAME" ]; then
            beta_args=(-beta "$APP_BRANCH_NAME")
          fi

          # -loginid makes each variant a distinct Steam session so probes can
          # run concurrently without "AlreadyLoggedInElsewhere". Authenticated
          # variants pass credentials; anonymous variants omit them (DepotDownloader
          # defaults to the anonymous account, which works for the client app).
          auth_args=(-loginid "$LOGIN_ID")
          if [ "$ANONYMOUS" != "true" ]; then
            auth_args+=(-username "$STEAM_USERNAME" -password "$STEAM_PASSWORD")
          fi

          # '|| true': DepotDownloader can exit non-zero even on a successful
          # manifest fetch. We don't trust its exit code — the 19-digit
          # validation below is the real gate (a genuine auth/network failure
          # yields no manifest id and still fails the step loudly).
          manifest_output=$(depot_downloader/DepotDownloader \
            -app "$APP_ID" \
            -depot "$APP_DEPOT_ID" \
            -manifest-only \
            "${auth_args[@]}" \
            "${beta_args[@]}" \
            -dir redist/temp_depots || true)

          current_manifest=$(printf '%s\n' "$manifest_output" | grep -oE '[0-9]{19}' | head -n 1 || true)

          # Fail loudly instead of silently treating an extraction failure as
          # "no change" (which would leave the variant stale-but-green forever).
          if ! [[ "$current_manifest" =~ ^[0-9]{19}$ ]]; then
            echo "::error::Could not extract a 19-digit manifest id for ${VARIANT} (Steam auth/network issue or output-format change?)."
            echo "----- DepotDownloader output (first 50 lines) -----"
            printf '%s\n' "$manifest_output" | head -n 50
            exit 1
          fi
          echo "Current manifest:  $current_manifest"

          previous_manifest=""
          [ -f "$MANIFEST_FILE" ] && previous_manifest=$(cat "$MANIFEST_FILE")
          echo "Previous manifest: ${previous_manifest:-<none>}"

          if [ "$current_manifest" != "$previous_manifest" ]; then
            echo "Manifest changed"
            echo "$current_manifest" > "$MANIFEST_FILE"
            echo "manifest_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Manifest unchanged"
            echo "manifest_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download update tool
        if: steps.compare_manifest.outputs.manifest_changed == 'true'
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1
        with:
          repository: RocketModFix/UnturnedRedistUpdateTool
          latest: true
          fileName: UnturnedRedistUpdateTool.zip
          out-file-path: redist_tool
          extract: true

      - name: Setup SteamCMD
        if: steps.compare_manifest.outputs.manifest_changed == 'true'
        uses: CyberAndrii/setup-steamcmd@afc45f145b95c175c3a3862d3ca84756537d48e8 # v1

      - name: Update game files
        if: steps.compare_manifest.outputs.manifest_changed == 'true'
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          APP_ID: ${{ matrix.appId }}
          APP_BRANCH_NAME: ${{ matrix.branch }}
          ANONYMOUS: ${{ matrix.anonymous }}
        run: |
          set -uo pipefail
          # Anonymous variants (e.g. the client app) log in anonymously; the rest
          # use the account credentials. steamcmd has no LoginID, so concurrent
          # authenticated downloads of the same source are serialized by this
          # job's concurrency group (see the job definition above).
          if [ "$ANONYMOUS" = "true" ]; then
            login_args=(+login anonymous)
          else
            login_args=(+login "$STEAM_USERNAME" "$STEAM_PASSWORD")
          fi
          beta_args=()
          if [ -n "$APP_BRANCH_NAME" ]; then
            beta_args=(-beta "$APP_BRANCH_NAME")
          fi
          # steamcmd is flaky: it can exit non-zero on success, and it can fail
          # to finish a download transiently (Steam CDN hiccups, anonymous "No
          # subscription" blips, or a self-update on first run). Its exit code is
          # not a reliable signal, so we RETRY and gate on the real artifact:
          # steamcmd only writes appmanifest_<appid>.acf once the install/update
          # completes (this is the same "no appmanifest -> force update" remedy
          # LinuxGSM uses). The redist tool needs that file, so checking it here
          # turns a flaky download into a clear, retried failure instead of a
          # cryptic FileNotFoundException downstream.
          manifest_present() {
            find "$GITHUB_WORKSPACE" -name "appmanifest_${APP_ID}.acf" -print -quit 2>/dev/null | grep -q .
          }
          attempts=4
          for i in $(seq 1 "$attempts"); do
            rc=0
            steamcmd +force_install_dir "$GITHUB_WORKSPACE" "${login_args[@]}" +app_update "$APP_ID" "${beta_args[@]}" -validate +quit || rc=$?
            if manifest_present; then
              echo "Download complete on attempt $i/$attempts (steamcmd rc=$rc)."
              break
            fi
            echo "::warning::steamcmd attempt $i/$attempts did not produce appmanifest_${APP_ID}.acf (rc=$rc); retrying after backoff..."
            [ "$i" -lt "$attempts" ] && sleep $((i * 15))
          done
          if ! manifest_present; then
            echo "::error::steamcmd failed to download app $APP_ID after $attempts attempts (no appmanifest_${APP_ID}.acf). Likely a transient Steam/anonymous outage — re-run the workflow."
            exit 1
          fi

      - name: Run redist updater
        if: steps.compare_manifest.outputs.manifest_changed == 'true'
        env:
          IS_PREVIEW: ${{ matrix.preview }}
          DO_PUBLICIZE: ${{ matrix.publicize }}
          APP_ID: ${{ matrix.appId }}
          REDIST_DIR: ${{ matrix.dir }}
          EVENT_NAME: ${{ github.event_name }}
          VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail
          flags=""
          # Manual dispatch forces a rebuild even if the tool thinks nothing changed.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            flags="$flags --force"
          fi
          # Only client-preview / server-preview emit the -preview<build> prerelease.
          if [ "$IS_PREVIEW" = "true" ]; then
            flags="$flags --preview"
          fi
          flags="$flags -update-files Assembly-CSharp.dll,Assembly-CSharp.xml,SDG.NetPak.Runtime.xml,UnturnedDat.dll,UnityEx.dll,SystemEx.dll,SDG.NetTransport.dll,SDG.NetPak.Runtime.dll,SDG.HostBans.Runtime.dll,SDG.Glazier.Runtime.dll,com.rlabrecque.steamworks.net.dll"
          if [ "$DO_PUBLICIZE" = "true" ]; then
            flags="$flags -publicize Assembly-CSharp.dll"
          fi
          echo "Variant: $VARIANT | Event: $EVENT_NAME | Flags: '$flags'"
          # Capture output so a failure (or a success that doesn't write .commit)
          # leaves diagnostics in the log, mirroring the manifest step.
          if ! tool_output=$(dotnet redist_tool/UnturnedRedistUpdateTool.dll "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/$REDIST_DIR" "$APP_ID" $flags 2>&1); then
            echo "::error::Redist updater failed for ${VARIANT}."
            echo "----- Tool output (first 80 lines) -----"
            printf '%s\n' "$tool_output" | head -n 80
            exit 1
          fi
          printf '%s\n' "$tool_output"

      - name: Generate commit message
        if: steps.compare_manifest.outputs.manifest_changed == 'true'
        id: generate_commit_message
        run: |
          set -euo pipefail
          if [ ! -s .commit ]; then
            echo "::error::Redist updater did not produce a non-empty .commit file for ${{ matrix.variant }}."
            exit 1
          fi
          {
            echo "message<<COMMIT_EOF"
            cat .commit
            echo "COMMIT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for git changes
        if: steps.compare_manifest.outputs.manifest_changed == 'true'
        id: check_git_changes
        run: |
          if git diff --quiet; then
            echo "No changes detected after processing for ${{ matrix.variant }}."
            echo "has_git_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected after processing for ${{ matrix.variant }}."
            echo "has_git_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # peter-evans/create-pull-request commits to a fixed-name branch and keeps
      # the open PR continually updated until it is merged/closed; delete-branch
      # cleans it up afterwards. No timestamped branches or existing-PR lookups.
      - name: Create Pull Request
        if: steps.compare_manifest.outputs.manifest_changed == 'true' && steps.check_git_changes.outputs.has_git_changes == 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          add-paths: |
            redist/*
          token: ${{ secrets.PAT }}
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          base: master
          commit-message: ${{ steps.generate_commit_message.outputs.message }}
          title: "🤖 Auto-update ${{ matrix.variant }} redist files"
          committer: rocketmodfixadmin <rocketmodfixadmin@users.noreply.github.com>
          author: rocketmodfixadmin <rocketmodfixadmin@users.noreply.github.com>
          body: |
            ## Automated Redist Update - ${{ matrix.variant }}

            This PR contains automatically updated redist files for the **${{ matrix.variant }}** variant.

            ### Changes
            ${{ steps.generate_commit_message.outputs.message }}

            ### Validation
            🔄 Validation (file presence, SHA-256 hashes, version monotonicity) runs automatically on this PR.

            ---

            **Triggered by**: ${{ github.event_name == 'workflow_dispatch' && 'Manual dispatch' || 'Scheduled run' }}
            **Variant**: ${{ matrix.variant }}
            **Branch**: `${{ env.BRANCH_NAME }}`

            > Automatically created by the Unturned Redist update workflow.
          draft: false
          labels: |
            automated
            redist-update
            ${{ matrix.variant }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## Update Summary for ${{ matrix.variant }}"
            echo "- **Branch**: \`${{ env.BRANCH_NAME }}\`"
            echo "- **Manifest Changed**: ${{ steps.compare_manifest.outputs.manifest_changed }}"
            if [ "${{ steps.compare_manifest.outputs.manifest_changed }}" = "true" ]; then
              echo "- **Git Changes**: ${{ steps.check_git_changes.outputs.has_git_changes }}"
              if [ -n "${{ steps.create_pr.outputs.pull-request-number }}" ]; then
                echo "- **PR**: #${{ steps.create_pr.outputs.pull-request-number }} (${{ steps.create_pr.outputs.pull-request-url }})"
              fi
            else
              echo "- **Status**: Skipped (no manifest changes)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # Make silent breakage visible: if any scheduled update fails, open (or
  # comment on) a tracking issue instead of relying on someone watching the
  # Actions tab.
  notify-failure:
    name: "Notify on failure"
    needs: [load-variants, update_redist]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          marker="Redist auto-update workflow failed"
          body=$(printf '⚠️ The scheduled redist update workflow failed.\n\nRun: %s\n\nA matrix variant errored (Steam auth/network, DepotDownloader, the redist tool, or PR creation). Check the run for the failing variant.' "$RUN_URL")
          gh label create update-failure --color B60205 --description "Automated redist update failure" --force >/dev/null 2>&1 || true
          existing=$(gh issue list --repo "$REPO" --state open --search "in:title \"$marker\"" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --title "⚠️ $marker" --body "$body" --label update-failure
          fi

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c # v1
